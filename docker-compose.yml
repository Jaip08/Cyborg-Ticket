services:
  db:
    image: postgres:16-alpine
    container_name: ticket-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketsystem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketsystem"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: ticket-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=ticketsystem;Username=postgres;Password=postgres"
      Jwt__Key: "docker-compose-dev-secret-please-change-in-production"
      Jwt__Issuer: "TicketSystem"
      Jwt__Audience: "TicketSystemClient"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5080/api"
    container_name: ticket-web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
